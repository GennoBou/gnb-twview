name: Windows Build CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      asset_sha256: ${{ steps.hash.outputs.asset_sha256 }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies (Frontend)
      shell: pwsh
      run: |
        cd frontend
        npm ci

    - name: Install Wails CLI
      shell: pwsh
      run: |
        go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.117

    - name: Build Application (Verification)
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      shell: pwsh
      run: |
        # %GOPATH%\bin is added to PATH by setup-go on runners
        wails3 build

    - name: Build & Package Application (Installer & Executable)
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        wails3 task package

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v7
      with:
        name: gnb-twview-windows
        path: |
          bin/gnb-twview.exe
          bin/gnb-twview-amd64-installer.exe
        if-no-files-found: ignore

    - name: Calculate Hash
      id: hash
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $hash = (Get-FileHash bin/gnb-twview.exe -Algorithm SHA256).Hash.ToLower()
        echo "asset_sha256=$hash" >> $env:GITHUB_OUTPUT

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        gh release create ${{ github.ref_name }} bin/gnb-twview.exe bin/gnb-twview-amd64-installer.exe --title "${{ github.ref_name }}" --notes "GNB Twitch Viewer ${{ github.ref_name }} Release"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-scoop-bucket:
    name: Update Scoop Bucket
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gnb-twview Repository
        uses: actions/checkout@v4
        with:
          path: gnb-twview

      - name: Checkout Scoop Bucket Repository
        uses: actions/checkout@v4
        with:
          repository: GennoBou/scoop-bucket
          token: ${{ secrets.BUCKET_PAT }}
          path: scoop-bucket

      - name: Generate and Update Manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ASSET_SHA256="${{ needs.build.outputs.asset_sha256 }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gnb-twview.exe"

          jq \
            --arg version "$VERSION" \
            --arg url "$DOWNLOAD_URL" \
            --arg hash "$ASSET_SHA256" \
            '.version = $version | .architecture."64bit".url = $url | .architecture."64bit".hash = $hash | .autoupdate.architecture."64bit".url = $url' \
            gnb-twview/gnb-twview.json > scoop-bucket/bucket/gnb-twview.json

      - name: Commit and Push to Scoop Bucket
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/gnb-twview.json
          git commit -m "Update gnb-twview to ${{ github.ref_name }}" || echo "No changes to commit"
          git push

